<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ font-family:'Plus Jakarta Sans',system-ui,sans-serif; background:#eef3fa; color:#16243d; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:rgba(27,63,134,.18); border-radius:8px; border:3px solid transparent; background-clip:content-box; }
  input,button,textarea{ font-family:inherit; }
  input:focus,textarea:focus{ outline:none; }
  :root{ --accent:#2b5fc4; --accent2:#5b8def; --accent-deep:#1f3f86; --glass:22px; }

  @keyframes pageIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(18px) scale(.97); } to{ opacity:1; transform:none; } }
  @keyframes ovIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes ovOut{ from{ opacity:1; } to{ opacity:0; } }
  @keyframes sheetIn{ from{ opacity:0; transform:translateY(26px) scale(.95); } to{ opacity:1; transform:none; } }
  @keyframes sheetOut{ from{ opacity:1; transform:none; } to{ opacity:0; transform:translateY(16px) scale(.97); } }
  @keyframes popIn{ 0%{ transform:scale(.3); opacity:0; } 60%{ transform:scale(1.18); } 100%{ transform:scale(1); opacity:1; } }
  @keyframes growBar{ from{ transform:scaleY(0); } to{ transform:scaleY(1); } }
  @keyframes growW{ from{ transform:scaleX(0); } to{ transform:scaleX(1); } }
  @keyframes toastIn{ from{ opacity:0; transform:translate(-50%,18px); } to{ opacity:1; transform:translate(-50%,0); } }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-delay:0ms !important; transition-duration:.001ms !important; }
  }

  /* hover / focus helpers (the design runtime did these inline) */
  .nav-in:hover{ background:rgba(255,255,255,.07)!important; color:#fff!important; }
  .btnp{ transition:transform .15s ease, box-shadow .15s ease; }
  .btnp:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(31,63,134,.36); }
  .card:hover{ transform:translateY(-9px) scale(1.014)!important; box-shadow:0 34px 66px rgba(27,63,134,.26), inset 0 1px 1px rgba(255,255,255,.95)!important; }
  .pkgc:hover{ transform:translateY(-6px)!important; box-shadow:0 22px 48px rgba(27,63,134,.14)!important; }
  .back:hover{ color:var(--accent)!important; }
  .inp:focus{ border-color:var(--accent)!important; }
  .seg:hover{ background:#f0f4fa; }
  .presetrow:hover{ background:#f4f7fc; }
  .rangebtn:hover{ border-color:var(--accent)!important; }
  .toneopt:hover{ border-color:#c2cfe2!important; }
  .sess:hover{ opacity:.85; }
  .sess-empty:hover .sessbox{ border-color:var(--accent)!important; color:var(--accent)!important; }
  .ghostbtn:hover{ background:#e6edf6!important; }
  .calday:hover{ filter:brightness(.97); }

// ---------- helpers ----------
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ return (n||0).toLocaleString('vi-VN')+'đ'; }
function fmtShort(n){ if(n>=1000000) return (n/1000000).toFixed(n%1000000?1:0).replace('.0','')+'tr'; if(n>=1000) return Math.round(n/1000)+'k'; return n+''; }
function dShort(iso){ if(!iso) return '—'; var p=iso.split('-'); return p[2]+'/'+p[1]; }
function dLong(iso){ if(!iso) return '—'; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function dMid(iso){ if(!iso) return '—'; var p=iso.split('-'); return (+p[2])+'/'+(+p[1])+'/'+p[0]; }
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d'); }
function pad(n){ return String(n).padStart(2,'0'); }
function localIso(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function addDaysIso(iso,n){ var d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return localIso(d); }
function formatVNLong(iso){ if(!iso) return 'Chọn ngày'; var p=iso.split('-'); return (+p[2])+' Tháng '+(+p[1])+' năm '+p[0]; }
function fmtDT(iso){ if(!iso) return ''; var d=new Date(iso); if(isNaN(d.getTime())) return String(iso); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
function today(){ return '2026-06-26'; }
function uid(){ state._uid=(state._uid||100)+1; return state._uid; }

// ---------- seed data ----------
function buildData(){
  var notes=['','Căng theo yêu cầu giải đấu','Khách thuận tay trái','Thay grip cuốn cán mới','Kiểm tra khung vợt'];
  var T=TONES();
  function addDays(iso,d){ var dt=new Date(iso+'T00:00:00'); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
  function mk(id,toneKey,buy,done,racket,off){
    var t=T[toneKey];
    var sessions=Array.from({length:5},function(_,i){
      if(i<done) return {done:true, date:addDays(buy,i*9+4), tension:[24,25,26,27,28][(i+off)%5], racket:racket, note:notes[(i+off)%notes.length]};
      return {done:false, date:'', tension:'', racket:'', note:''};
    });
    return {id:id, tone:toneKey, total:t.total, per:t.per, buyDate:buy, sessions:sessions};
  }
  return [
    {id:'c1', name:'Nguyễn Văn Hải', phone:'0905 123 456', initials:'NH', racket:'Yonex Astrox 99 Pro', packages:[ mk('p1','BG66','2026-06-12',3,'Yonex Astrox 99 Pro',0), mk('p2','BG65','2026-03-02',5,'Yonex Astrox 99 Pro',1) ]},
    {id:'c2', name:'Trần Thị Mai Anh', phone:'0912 884 207', initials:'MA', racket:'Arcsaber 11 Pro', packages:[ mk('p3','BG65','2026-06-20',1,'Arcsaber 11 Pro',2) ]},
    {id:'c3', name:'Lê Quốc Bảo', phone:'0978 332 901', initials:'QB', racket:'Nanoflare 800 Pro', packages:[ mk('p4','BG66','2026-06-02',5,'Nanoflare 800 Pro',3), mk('p5','BG66','2026-01-15',5,'Nanoflare 800 Pro',1) ]},
    {id:'c4', name:'Phạm Minh Quân', phone:'0934 561 778', initials:'MQ', racket:'Astrox 100 ZZ', packages:[ mk('p6','BG65','2026-06-18',4,'Astrox 100 ZZ',2) ]},
    {id:'c5', name:'Võ Thành Trung', phone:'0901 447 552', initials:'TT', racket:'Astrox 88D Pro', packages:[ mk('p7','BG66','2026-06-22',2,'Astrox 88D Pro',0) ]},
    {id:'c6', name:'Đỗ Thị Hồng', phone:'0967 220 145', initials:'TH', racket:'Nanoflare 700', packages:[ mk('p8','BG65','2026-05-28',5,'Nanoflare 700',4) ]}
  ];
}

// ---------- persistence ----------
function loadLocal(){
  try{ var raw=localStorage.getItem(LS_KEY); if(raw){ var d=JSON.parse(raw); if(Array.isArray(d)) return d; } }catch(e){}
  return buildData();
}
function initialCustomers(){
  // Cloud mode boots from the offline cache (or empty) and refreshes from
  // Supabase in bootCloud(); local mode uses the seeded localStorage store.
  if(CLOUD){ try{ var r=localStorage.getItem(CACHE_KEY); if(r){ var d=JSON.parse(r); if(Array.isArray(d)) return d; } }catch(e){} return []; }
  return loadLocal();
}
// Snapshot to localStorage: real store in local mode, offline cache in cloud mode.
function saveCustomers(){ try{ localStorage.setItem(CLOUD?CACHE_KEY:LS_KEY, JSON.stringify(state.customers)); }catch(e){} }

// ---------- cloud (Supabase) ----------
function custToRow(c){ return {id:c.id, name:c.name, phone:c.phone, initials:c.initials, racket:c.racket}; }
function pkgToRow(custId,p){ return {id:p.id, customer_id:custId, tone:p.tone, total:p.total, per:p.per, buy_date:p.buyDate, sessions:p.sessions}; }
function rowsToCustomers(custRows, pkgRows){
  var map={};

// ---------- reports ----------
function enumerate(from,to,gran){
  var out=[]; var d0=new Date(from+'T00:00:00'), d1=new Date(to+'T00:00:00');
  if(gran==='day'){
    for(var d=new Date(d0); d<=d1; d.setDate(d.getDate()+1)){ var k=localIso(d); out.push({label:d.getDate()+'/'+(d.getMonth()+1), match:(function(kk){return function(iso){return iso===kk;};})(k)}); }
  } else if(gran==='week'){
    var s0=new Date(d0); var dow=(s0.getDay()+6)%7; s0.setDate(s0.getDate()-dow);
    for(var s=new Date(s0); s<=d1; s.setDate(s.getDate()+7)){ var ks=localIso(s); var e=new Date(s); e.setDate(e.getDate()+6); var ke=localIso(e); out.push({label:s.getDate()+'/'+(s.getMonth()+1), match:(function(a,b){return function(iso){return iso>=a&&iso<=b;};})(ks,ke)}); }
  } else {
    var y=d0.getFullYear(), m=d0.getMonth(); var ey=d1.getFullYear(), em=d1.getMonth();
    while(y<ey||(y===ey&&m<=em)){ var kk=y+'-'+pad(m+1); out.push({label:'Th'+(m+1), match:(function(key){return function(iso){return iso.slice(0,7)===key;};})(kk)}); m++; if(m>11){m=0;y++;} }
  }
  return out;
}
function computeTotals(){
  var revenue=0, packages=0, sessions=0;
  state.customers.forEach(function(c){ c.packages.forEach(function(p){
    if(inRange(p.buyDate)){ revenue+=p.total; packages++; }
    p.sessions.forEach(function(s){ if(s.done && inRange(s.date)) sessions++; });
  }); });
  return {revenue:revenue, packages:packages, sessions:sessions};
}
// Outstanding sessions: prepaid 5-session packages not yet strung. Snapshot of
// current liability (un-done sessions), grouped by tone — independent of range.
function computeRemaining(){
  var byTone={BG65:0, BG66:0}, total=0, pkgs=0;
  state.customers.forEach(function(c){ c.packages.forEach(function(p){
    var undone=p.sessions.filter(function(s){return !s.done;}).length;
    if(undone>0){ pkgs++; total+=undone; if(byTone[p.tone]!=null) byTone[p.tone]+=undone; }
  }); });
  return {total:total, byTone:byTone, pkgs:pkgs};
}
function computeReport(){
  var reportMode=state.reportMode, granularity=state.granularity, rangeFrom=state.rangeFrom, rangeTo=state.rangeTo; var T=TONES();
  var buckets=enumerate(rangeFrom, rangeTo, granularity);
  var vals=buckets.map(function(){return 0;}); var byTone={BG65:0, BG66:0};
  state.customers.forEach(function(c){ c.packages.forEach(function(p){
    if(reportMode==='revenue'){ if(inRange(p.buyDate)){ var i=buckets.findIndex(function(b){return b.match(p.buyDate);}); if(i>=0){ vals[i]+=p.total; byTone[p.tone]+=p.total; } } }
    else { p.sessions.forEach(function(s){ if(s.done && inRange(s.date)){ var i=buckets.findIndex(function(b){return b.match(s.date);}); if(i>=0){ vals[i]++; byTone[p.tone]++; } } }); }
  }); });
  var max=Math.max.apply(null,[1].concat(vals)); var few=buckets.length<=14; var every=Math.max(1,Math.ceil(buckets.length/12));
  var bars=buckets.map(function(b,i){ return { label:b.label, axisLabel:(few||i%every===0)?b.label:'', valLabel: few?(reportMode==='revenue'?fmtShort(vals[i]):(vals[i]+'')):'', h:(vals[i]/max*100)+'%', delay:(Math.min(i,18)*45)+'ms' }; });
  var tot=(byTone.BG65+byTone.BG66)||1;
  var tone=[
    {label:'BG65 Titanium', color:T.BG65.color, w:(byTone.BG65/tot*100)+'%', valLabel: reportMode==='revenue'? fmt(byTone.BG65):(byTone.BG65+' lượt')},
    {label:'BG66 Ultimax', color:T.BG66.color, w:(byTone.BG66/tot*100)+'%', valLabel: reportMode==='revenue'? fmt(byTone.BG66):(byTone.BG66+' lượt')}
  ];
  return {bars:bars, tone:tone};
}
var rafId=null;
function animateCounts(){

  var elR=document.getElementById('cRev'), elP=document.getElementById('cPkg'), elS=document.getElementById('cSess');
  if(!elR||!elP||!elS || document.hidden){ state.counts=t; if(elR){elR.textContent=fmt(t.revenue);elP.textContent=t.packages+'';elS.textContent=t.sessions+'';} return; }
  var start=performance.now(), dur=850, ease=function(x){return 1-Math.pow(1-x,3);};
  function tick(now){ var p=Math.min(1,(now-start)/dur), e=ease(p);
    var cur={revenue:Math.round(t.revenue*e), packages:Math.round(t.packages*e), sessions:Math.round(t.sessions*e)};
    state.counts=cur;
    var r=document.getElementById('cRev'), pp=document.getElementById('cPkg'), ss=document.getElementById('cSess');
    if(r){ r.textContent=fmt(cur.revenue); pp.textContent=cur.packages+''; ss.textContent=cur.sessions+''; }
    if(p<1) rafId=requestAnimationFrame(tick);
  }
  cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tick);
}

function buildCal(y,m,from,to){
  var first=new Date(y,m,1); var dow=(first.getDay()+6)%7; var start=new Date(y,m,1-dow); var cells=[];
  for(var i=0;i<42;i++){
    var d=new Date(start); d.setDate(start.getDate()+i); var iso=localIso(d); var inMonth=d.getMonth()===m;
    var v='norm';

    cells.push({day:d.getDate(), iso:iso, style:cellStyle(v), clickable:inMonth});

function pageHistory(){
  var st=state;
  function meta(action){
    if(action==='add_customer')    return {c:'#2b5fc4', t:'Thêm khách'};
    if(action==='add_package')     return {c:'#1f3f86', t:'Thêm gói'};
    if(action==='save_session')    return {c:'#2e9e6b', t:'Lần đan'};
    if(action==='delete_customer') return {c:'#c8344b', t:'Xóa khách'};
    if(action==='delete_session')  return {c:'#c8344b', t:'Xóa lần đan'};
    return {c:'#7a8eaa', t:action||'—'};
  }
  var rows=st.history.map(function(h){
    var mt=meta(h.action);
    return '<div style="display:flex;gap:14px;align-items:flex-start;background:#fff;border:1px solid #e6edf6;border-radius:16px;padding:15px 18px;box-shadow:0 4px 14px rgba(27,63,134,.05)">'
      + '<span style="margin-top:6px;width:10px;height:10px;border-radius:50%;background:'+mt.c+';flex-shrink:0;box-shadow:0 0 0 4px '+mt.c+'22"></span>'
      + '<div style="flex:1;min-width:0;display:flex;align-items:center;gap:9px;flex-wrap:wrap">'
        + '<span style="font-size:11.5px;font-weight:800;color:'+mt.c+';background:'+mt.c+'14;padding:3px 9px;border-radius:7px;white-space:nowrap">'+esc(mt.t)+'</span>'
        + '<span style="font-size:14.5px;font-weight:600;color:#16243d">'+esc(h.label||'')+'</span>'
      + '</div>'
      + '<span style="font-size:12.5px;color:#7a8eaa;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;margin-top:2px">'+esc(fmtDT(h.at))+'</span>'
    + '</div>';
  }).join('');
  function empty(title, sub){ return '<div style="text-align:center;padding:80px 20px;color:#90a2bf"><div style="font-size:17px;font-weight:700;color:#5a7299;margin-bottom:6px">'+title+'</div><div style="font-size:14px">'+sub+'</div></div>'; }
  var body;
  if(st.historyLoading) body=empty('Đang tải lịch sử…','Kết nối tới cơ sở dữ liệu');
  else if(!CLOUD) body=empty('Chưa bật cơ sở dữ liệu','Lịch sử chỉ được ghi khi kết nối Supabase');
  else if(st.history.length===0) body=empty('Chưa có thay đổi nào','Các thao tác thêm / sửa / xóa sẽ hiện ở đây');
  else body='<div style="display:flex;flex-direction:column;gap:10px">'+rows+'</div>';

  return '<div style="position:relative;z-index:1;padding:32px 38px 48px;max-width:920px;'+(ANIM_PAGE?'animation:pageIn .45s ease both':'')+'">'
    + '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px">'
      + '<div><div style="font-size:26px;font-weight:800;letter-spacing:-.02em">Lịch sử thay đổi</div><div style="font-size:13.5px;color:#5a7299;font-weight:500;margin-top:3px">'+(CLOUD&&!st.historyLoading?st.history.length+' thay đổi gần đây':'Nhật ký thao tác')+'</div></div>'
      + '<div class="rangebtn" data-act="reloadHistory" style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e6edf6;border-radius:13px;padding:9px 15px;cursor:pointer;font-weight:700;font-size:13px;color:#16243d;transition:border-color .15s">'+ICON.history+'Tải lại</div>'
    + '</div>'+body
  + '</div>';
}

    return '<div class="presetrow" data-act="pickPreset" data-preset="'+key+'" style="'+style+'">'+name+'</div>';
  }).join('');
  var weekdays=['T2','T3','T4','T5','T6','T7','CN'];
  var wdHtml=weekdays.map(function(w){return '<div style="text-align:center;font-size:11.5px;font-weight:700;color:#90a2bf;padding:6px 0">'+w+'</div>';}).join('');
  function calGrid(cells){
    return cells.map(function(c){
      var attr=c.clickable? ' class="calday" data-act="pickDay" data-day="'+c.iso+'"':'';
      return '<div'+attr+' style="'+c.style+'">'+c.day+'</div>';
    }).join('');
  }
  var calLeft=buildCal(rd.calY,rd.calM,rd.from,rd.to), calRight=buildCal(ny,nm,rd.from,rd.to);
  var boxBase='flex:1;border-radius:13px;padding:13px 16px;font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;';
  var fromBoxStyle=boxBase+(rd.focus==='from'?'border:1.5px solid var(--accent,#2b5fc4);background:rgba(43,95,196,.05);color:#16243d;':'border:1.5px solid #dde6f2;color:#16243d;');
  var toBoxStyle=boxBase+(rd.focus==='to'?'border:1.5px solid var(--accent,#2b5fc4);background:rgba(43,95,196,.05);color:#16243d;':'border:1.5px solid #dde6f2;color:'+(rd.to?'#16243d;':'#90a2bf;'));
  var draftLabel=rd.from?(dMid(rd.from)+(rd.to&&rd.to!==rd.from?'  →  '+dMid(rd.to):'')):'Chọn khoảng ngày';

  var inner='<div style="display:flex;min-height:0;flex:1">'
    + '<div style="width:188px;flex-shrink:0;border-right:1px solid #eef2f8;padding:18px 14px;display:flex;flex-direction:column;gap:3px">'+presetsHtml+'</div>'
    + '<div style="flex:1;min-width:0;padding:20px 24px;display:flex;flex-direction:column">'
      + '<div style="display:flex;gap:12px;margin-bottom:18px"><div data-act="focusFrom" style="'+fromBoxStyle+'">'+formatVNLong(rd.from)+'</div><div data-act="focusTo" style="'+toBoxStyle+'">'+formatVNLong(rd.to)+'</div></div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
        + '<div class="seg" data-act="prevMonth" style="width:34px;height:34px;border-radius:10px;background:#f0f4fa;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#5a7299">'+ICON.chevL+'</div>'
        + '<div style="flex:1;display:flex;justify-content:space-around;gap:12px"><div style="font-size:14.5px;font-weight:800;color:#16243d">'+monthName(rd.calM)+' - '+rd.calY+'</div><div style="font-size:14.5px;font-weight:800;color:#16243d">'+monthName(nm)+' - '+ny+'</div></div>'
        + '<div class="seg" data-act="nextMonth" style="width:34px;height:34px;border-radius:10px;background:#f0f4fa;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#5a7299">'+ICON.chevR+'</div>'
      + '</div>'
      + '<div style="display:flex;gap:24px">'
        + '<div style="flex:1;min-width:0"><div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">'+wdHtml+'</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">'+calGrid(calLeft)+'</div></div>'
        + '<div style="flex:1;min-width:0"><div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">'+wdHtml+'</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">'+calGrid(calRight)+'</div></div>'
      + '</div>'
    + '</div>'
  + '</div>'
  + '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;border-top:1px solid #eef2f8;padding:16px 24px"><div style="font-size:13px;color:#7a8eaa;font-weight:600">'+draftLabel+'</div>'
    + '<div style="display:flex;gap:12px"><button data-act="closeModal" style="background:#fff;color:#5a7299;border:1.5px solid #dde6f2;border-radius:13px;padding:11px 22px;font-weight:700;font-size:14px;cursor:pointer">Hủy</button>'
    + '<button data-act="applyRange" style="background:linear-gradient(135deg,var(--accent,#2b5fc4),var(--accent-deep,#1f3f86));color:#fff;border:none;border-radius:13px;padding:11px 26px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 18px rgba(31,63,134,.26)">Áp dụng</button></div>';

  return '<div data-act="closeModal" style="position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;background:rgba(22,36,61,.42);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:'+ovAnim+' .27s ease both">'
    + '<div data-act="modalStop" style="width:880px;max-width:94vw;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 30px 70px rgba(22,36,61,.32);animation:'+sheetAnim+' .3s cubic-bezier(.2,.8,.2,1) both;display:flex;flex-direction:column;max-height:92vh">'+inner+'</div>'
  + '</div>';
}
function toastView(){
  if(!state.toast) return '';
  return '<div style="position:fixed;left:50%;bottom:30px;z-index:60;background:#16243d;color:#fff;padding:14px 22px;border-radius:14px;font-size:14px;font-weight:700;box-shadow:0 16px 40px rgba(22,36,61,.4);display:flex;align-items:center;gap:10px;animation:toastIn .3s cubic-bezier(.2,.8,.2,1) both">'+ICON.toastCheck+esc(state.toast)+'</div>';
}

function modals(){
  var m=state.modal; var out='';
  if(m==='addCustomer') out+=modalAddCustomer();
  else if(m==='addPackage') out+=modalAddPackage();
  else if(m==='session') out+=modalSession();
  else if(m==='range') out+=modalRange();
  else if(m==='confirm') out+=modalConfirm();
  out+=toastView();
  return out;
}

function view(){
  var page='';
  if(state.page==='list') page=pageList();
  else if(state.page==='detail') page=pageDetail();
  else if(state.page==='reports') page=pageReports();
  else if(state.page==='history') page=pageHistory();
  return '<div style="display:flex;width:100vw;height:100vh;overflow:hidden;position:relative">'
    + sidebar()
    + '<div id="content" style="flex:1;min-width:0;overflow-y:auto;position:relative;background:#e8f1fc">'+bgLayers()+page+'</div>'
    + modals()
  + '</div>';
}

// ---------- render with focus preservation ----------
var appEl=document.getElementById('app');
function render(){
  // Animate a page/modal only on the render where it first appears.
  ANIM_PAGE = (state.page !== _prevPage);
  ANIM_MODAL = (!!state.modal && state.modal !== _prevModal);
  var ae=document.activeElement;
  var fk=(ae&&ae.dataset)?ae.dataset.k:null;
  var ss=null, se=null, restoreSel=false;
  if(ae){
    var tag=ae.tagName, typ=(ae.getAttribute&&ae.getAttribute('type'))||'';
    if(tag==='TEXTAREA' || (tag==='INPUT' && (typ===''||typ==='text'||typ==='search'||typ==='tel'))){
      try{ ss=ae.selectionStart; se=ae.selectionEnd; restoreSel=true; }catch(e){}
    }
  }
  appEl.innerHTML=view();
  _prevPage=state.page; _prevModal=state.modal;
  if(fk){
    var el=appEl.querySelector('[data-k="'+fk+'"]');
    if(el){ el.focus(); if(restoreSel && ss!=null){ try{ el.setSelectionRange(ss,se); }catch(e){} } }
  }
  bindGlow();
}

// ---------- mouse glow ----------
var rmm=false;
try{ rmm=matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}
var glowRaf=null;
function bindGlow(){
  if(rmm) return;
  var content=document.getElementById('content'), glow=document.getElementById('glow');
  if(!content||!glow) return;
  content.addEventListener('mousemove', function(e){
    var r=content.getBoundingClientRect();
    var x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)), y=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
    if(glowRaf) return;
    glowRaf=requestAnimationFrame(function(){ glowRaf=null;
      var g=glow.style;
      g.setProperty('--mx',(x*100).toFixed(1)+'%'); g.setProperty('--my',(y*100).toFixed(1)+'%');
      g.setProperty('--mx2',((1-x)*100).toFixed(1)+'%'); g.setProperty('--my2',((1-y*0.7)*100).toFixed(1)+'%');
      var warm=0.30+x*0.26, cool=0.22+(1-x)*0.30;
      g.setProperty('--glow-warm','rgba(255,244,218,'+warm.toFixed(2)+')');
      g.setProperty('--glow-cool','rgba(110,172,255,'+cool.toFixed(2)+')');
    });
  });
  content.addEventListener('mouseleave', function(){
    var g=glow.style; g.setProperty('--mx','60%'); g.setProperty('--my','38%'); g.setProperty('--mx2','40%'); g.setProperty('--my2','70%');
    g.setProperty('--glow-warm','rgba(255,246,225,.42)'); g.setProperty('--glow-cool','rgba(120,178,255,.34)');
  });
}

// ---------- event delegation ----------
var ACTIONS={
  goList:goList, goReports:goReports, goHistory:goHistory, reloadHistory:loadHistory, closeModal:closeModal, modalStop:function(){},
  addCustomer:function(){ openModal('addCustomer'); },
  addCustomerSave:addCustomer,
  addPackage:function(){ openModal('addPackage', {pkgForm:{tone:'BG66'}}); },
  addPackageSave:addPackage,
  saveSession:saveSession,
  askDeleteCustomer:function(){ var c=current(); askConfirm('Xóa khách hàng?', 'Xóa “'+(c?c.name:'')+'” cùng toàn bộ gói và lịch sử đan của khách này. Hành động không thể hoàn tác.', 'Xóa khách', deleteCustomer); },
  askDeleteSession:function(){ askConfirm('Xóa lần đan?', 'Xóa thông tin lần đan #'+(state.sessionForm.idx+1)+'. Ô này sẽ trở lại trạng thái “chưa đan”.', 'Xóa lần đan', deleteSession); },
  confirmYes:function(){ var fn=pendingConfirm; pendingConfirm=null; if(fn) fn(); },
  setModeRevenue:function(){ setState({reportMode:'revenue'}); },
  setModeSessions:function(){ setState({reportMode:'sessions'}); },
  granDay:function(){ setState({granularity:'day'}); },
  granWeek:function(){ setState({granularity:'week'}); },
  granMonth:function(){ setState({granularity:'month'}); },
  openRange:openRange,
  focusFrom:function(){ setFocus('from'); },
  focusTo:function(){ setFocus('to'); },
  prevMonth:function(){ shiftCal(-1); },
  nextMonth:function(){ shiftCal(1); },
  applyRange:applyRange
};
appEl.addEventListener('click', function(e){
  var el=e.target.closest('[data-act]');
  if(!el) return;
  var act=el.dataset.act;
  if(act==='open'){ goDetail(el.dataset.id); return; }
  if(act==='session'){ openSession(el.dataset.pid, parseInt(el.dataset.idx,10)); return; }
  if(act==='pickTone'){ setState({pkgForm:{tone:el.dataset.tone}}); return; }
  if(act==='pickPreset'){ pickPreset(el.dataset.preset); return; }
  if(act==='pickDay'){ clickDay(el.dataset.day); return; }
  var fn=ACTIONS[act];
  if(fn) fn();
});
appEl.addEventListener('input', function(e){
  var el=e.target.closest('[data-inp]'); if(!el) return;
  var key=el.dataset.inp, val=el.value, st=state;
  // Search needs a live re-render to filter the list. Staying on the list page
  // means ANIM_PAGE is false, so cards don't replay their entrance (no flicker).
  if(key==='search'){ state.search=val; render(); return; }
  // Form fields: update state only, NO re-render. The DOM input already shows
  // the typed text; re-rendering replayed the modal entrance animation on every
  // keystroke, causing the flicker. We read state on submit.
  if(key==='cname') state.custForm=Object.assign({},st.custForm,{name:val});
  else if(key==='cphone') state.custForm=Object.assign({},st.custForm,{phone:val});
  else if(key==='sfdate') state.sessionForm=Object.assign({},st.sessionForm,{date:val});
  else if(key==='sftension') state.sessionForm=Object.assign({},st.sessionForm,{tension:val});
  else if(key==='sfracket') state.sessionForm=Object.assign({},st.sessionForm,{racket:val});
  else if(key==='sfnote') state.sessionForm=Object.assign({},st.sessionForm,{note:val});
});
// Enter-to-submit on add-customer name/phone
appEl.addEventListener('keydown', function(e){
  if(e.key!=='Enter') return;
  var el=e.target.closest('[data-inp]'); if(!el) return;
  if(el.dataset.inp==='cname'||el.dataset.inp==='cphone'){ e.preventDefault(); addCustomer(); }
});

// ---------- boot ----------
render();
if(CLOUD) bootCloud();

})();
</script>
</body>
</html>
